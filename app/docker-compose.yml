# ── Shared volumes ────────────────────────────────────────────────────────────
volumes:
  mlflow_data:   # persists MLflow runs + model artifacts across restarts

services:

  # ── MLflow Tracking Server ───────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: covered-call-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # ── FastAPI inference server ──────────────────────────────────────────────────
  api:
    build:
      context: ..               # project root — COPY paths resolve from here
      dockerfile: app/api/Dockerfile
    container_name: covered-call-api
    restart: unless-stopped
    environment:
      - MODEL_PATH=/app/saved_models/lstm_cnn_best_model.pth
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_MODEL_URI=models:/CoveredCallLSTMCNN/Champion
    ports:
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Streamlit frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: app/frontend/Dockerfile
    container_name: covered-call-frontend
    restart: unless-stopped
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

networks:
  default:
    name: covered-call-network
